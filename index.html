<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tech Support Bot</title>

<link rel="stylesheet" href="style.css">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🤖 Tech Support Bot</div>

  <div class="right">

    <span class="online">● Online</span>

    <!-- TOGGLE IA (BOOTSTRAP) -->
    <input type="checkbox" class="btn-check" id="iaToggle" autocomplete="off">
    <label class="btn btn-primary" for="iaToggle">🤖 OpenAI</label>

    <!-- DARK MODE -->
    <button id="themeBtn" class="theme-toggle">🌙</button>

  </div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

  <div class="bot"></div>

  <div class="message">
    Olá! Sou seu assistente de tecnologia. Como posso ajudar?
  </div>

</div>

<!-- INPUT -->
<div class="input-area">

  <input
    id="userInput"
    type="text"
    placeholder="Digite sua pergunta..."
  >

  <button class="send" onclick="enviarPergunta()">
    Enviar
  </button>

</div>

<script src="script.js"></script>

</body>
</html>

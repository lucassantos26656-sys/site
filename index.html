<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tech Support Bot</title>

  <!-- 🔥 AQUI você conecta o CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔽 HEADER (adicione o botão aqui) -->
  <div class="header">
    <div class="title">🤖 Tech Support Bot</div>

    <div class="right">
      <span class="online">● Online</span>

      <!-- 🔥 BOTÃO SOL / LUA -->
      <button id="themeBtn" class="theme-toggle">🌙</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="bot"></div>

    <div class="message">
      Olá! Sou seu assistente de tecnologia. Como posso ajudar?
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input type="text" placeholder="Digite sua pergunta sobre tecnologia...">
    <button class="send">Enviar</button>
  </div>

  <!-- 🔥 AQUI você conecta o JS -->
  <script src="script.js"></script>

</body>
</html>
